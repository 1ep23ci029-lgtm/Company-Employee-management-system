<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Employee Management System</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1><i class="fa-solid fa-building"></i> Company Employee Management System</h1>

    <div class="employee-form">

        <div class="input-box">
            <label>Employee ID</label>
            <input type="number" id="empId" placeholder="Enter Employee ID">
        </div>

        <div class="input-box">
            <label>Employee Name</label>
            <input type="text" id="empName" placeholder="Enter Employee Name">
        </div>

        <div class="input-box">
            <label>Age</label>
            <input type="number" id="age" placeholder="Enter Age">
        </div>

        <div class="input-box">
            <label>Designation</label>
            <input type="text" id="designation" placeholder="Enter Designation">
        </div>

        <div class="input-box">
            <label>Salary</label>
            <input type="number" id="salary" placeholder="Enter Salary">
        </div>

        <div class="input-box">
            <label>Mobile Number</label>
            <input type="text" id="mobile" maxlength="10" placeholder="Enter Mobile Number">
        </div>
        <div class="input-box">
            <label>Status</label>

            <select id="status">
                <option value="">Select Status</option>
                <option value="Available">Available</option>
                <option value="Resigned">Resigned</option>
            </select>
        </div>

        

    </div>

    <div class="buttons">

        <button onclick="validateEmployee()">
            <i class="fa-solid fa-circle-check"></i>
            Validate
        </button>

        <button onclick="AddEmployee()">
            <i class="fa-solid fa-cloud-arrow-up"></i>
            Add
        </button>

        <button onclick="updateEmployee()">
            <i class="fa-solid fa-pen"></i>
            Update
        </button>

        <button onclick="deleteEmployee()">
            <i class="fa-solid fa-trash"></i>
            Delete
        </button>

        <button onclick="clearForm()">
            <i class="fa-solid fa-eraser"></i>
            Clear
        </button>

    </div>

    <div class="search-box">

        <input
        type="text"
        id="search"
        placeholder="Search by Employee ID or Name"
        onkeyup="searchEmployee()">

    </div>

    <div class="response">

        <h3>Server Response</h3>

        <p id="serverResponse">
            Waiting for request...
        </p>

    </div>

    <div class="table-section">

        <h2>Available Employees</h2>

        <table>

            <thead>

            <tr>

                <th>ID</th>
                <th>Name</th>
                <th>Age</th>
                <th>Designation</th>
                <th>Salary</th>
                <th>Mobile</th>
                <th>Status</th>

            </tr>

            </thead>

            <tbody id="employeeTable">

            </tbody>

        </table>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
